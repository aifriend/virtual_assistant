name: CI
on:
  push:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff (syntax + undefined names)
        run: ruff check --select E9,F63,F7,F82 --extend-exclude '*.ipynb,rasa_core.back' .
      - name: Byte-compile all sources
        run: python -m compileall -q -x '\.git|rasa_core\.back' .
